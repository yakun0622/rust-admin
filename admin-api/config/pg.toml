[app]
name = "admin-api"
env = "pg"
log_level = "debug"

[server]
host = "0.0.0.0"
port = 8080

[database]
driver = "postgres"
url = "postgres://postgres:123456@127.0.0.1:5432/rust_admin"
max_connections = 30
min_connections = 5
acquire_timeout_secs = 5

[redis]
url = "redis://127.0.0.1:6379/0"
pool_size = 30
connection_timeout_secs = 3

[security]
jwt_secret = "dev-jwt-secret-change-me"
jwt_expires_secs = 7200
