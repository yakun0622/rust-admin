[app]
name = "admin-api"
env = "default"
log_level = "info"

[server]
host = "0.0.0.0"
port = 8080

[mysql]
url = "mysql://root:123456@127.0.0.1:3306/rust_admin?charset=utf8mb4"
max_connections = 20
min_connections = 5
acquire_timeout_secs = 5

[redis]
url = "redis://127.0.0.1:6379/0"
pool_size = 20
connection_timeout_secs = 3

[security]
jwt_secret = "replace-with-a-strong-secret"
jwt_expires_secs = 7200
